<style>
  html, body { margin: 0; padding: 0; background: #EFEEEA; min-height: 100%; }
  body { font-family: "Nunito Sans", -apple-system, system-ui, sans-serif; }

<body>

<script src="5ede92ab-167e-4037-ab6b-887055dc17a7" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="3f35ec53-3ca5-41af-94bc-ef076fb9e8d8"></script>

<script type="text/babel">
function OnboardingDemo() {
  const [frame, setFrame] = React.useState('ios');
  const [runKey, setRunKey] = React.useState(0);
  const theme = getTheme({ dark: false, palette: 'sage', ringStyle: 'concentric', density: 'airy', fabPulse: true });
  const Device = frame === 'ios' ? IOSDevice : AndroidDevice;
  return (
    <div style={{ minHeight: '100vh', padding: '70px 20px 50px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 22, background: '#EFEEEA' }}>
      <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
        <div style={{ display: 'flex', gap: 4, background: '#fff', borderRadius: 100, padding: 4, boxShadow: '0 2px 10px rgba(27,27,27,0.06)' }}>
          {[['ios','iOS'],['android','Android']].map(([id, label]) => (
            <button key={id} onClick={() => setFrame(id)} style={{
              padding: '8px 18px', borderRadius: 100, border: 'none', cursor: 'pointer',
              background: frame === id ? '#1B1B1B' : 'transparent', color: frame === id ? '#fff' : '#1B1B1B',
              fontFamily: '"Plus Jakarta Sans", system-ui', fontSize: 13, fontWeight: 700,
            }}>{label}</button>
          ))}
        </div>
        <button onClick={() => setRunKey(k => k + 1)} style={{
          padding: '10px 18px', borderRadius: 100, border: 'none', cursor: 'pointer',
          background: '#97AF8F', color: '#fff', fontFamily: '"Plus Jakarta Sans", system-ui', fontSize: 13, fontWeight: 700,
          boxShadow: '0 4px 14px rgba(151,175,143,0.4)',
        }}>Reiniciar fluxo</button>
      </div>

      <Device width={390} height={844} dark={false}>
        <div key={frame + runKey} style={{ height: '100%', background: theme.bg }}>
          <OnboardingFlow theme={theme} frame={frame} onComplete={() => setRunKey(k => k + 1)} />
        </div>
      </Device>

      <div style={{ fontFamily: '"Nunito Sans", system-ui', fontSize: 12, color: 'rgba(27,27,27,0.45)', textAlign: 'center', maxWidth: 360 }}>
        Onboarding Nutri Lu · 17 telas · protótipo navegável. Ao concluir, o fluxo reinicia automaticamente.
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<OnboardingDemo />);
</script>



</body></html>
